<style>
  :root {
    --ink: #1a1a18; --ink-muted: #5a5a54; --ink-faint: #9a9a90;
    --paper: #f7f5f0; --rule: #d8d4c8;
    --accent: #2a5c3f; --accent-light: #e8f0eb;
    --sans: 'DM Sans', sans-serif; --serif: 'Playfair Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 17px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  .contact-page { min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
  .contact-card { max-width: 620px; width: 100%; background: #fff; border: 1px solid var(--rule); border-radius: 12px; padding: 3rem 2.25rem; text-align: center; box-shadow: 0 22px 50px rgba(26,26,24,0.06); }
  .section-eyebrow { display: inline-block; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .contact-card h1 { font-family: var(--serif); font-size: clamp(32px,4vw,44px); line-height: 1.2; margin: 0 0 1rem; }
  .contact-card p.lede { color: var(--ink-muted); margin: 0 0 2rem; }
  .contact-form { display: flex; gap: 8px; max-width: 440px; margin: 0 auto 1.25rem; flex-wrap: wrap; }
  .contact-form input { flex: 1; min-width: 220px; padding: 12px 14px; font-family: inherit; font-size: 15px; border: 1px solid var(--rule); border-radius: 4px; background: var(--paper); color: var(--ink); }
  .contact-form input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .contact-form button { background: var(--accent); color: #fff; font-family: inherit; font-size: 15px; font-weight: 500; padding: 12px 20px; border: 0; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
  .contact-form button:hover { background: #1e4430; }
  .contact-note { font-size: 14px; color: var(--ink-muted); margin-bottom: 1.5rem; }
  .contact-note a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .contact-note a:hover { text-decoration: underline; }
  .back-link { display: inline-block; font-size: 14px; color: var(--ink-faint); text-decoration: none; margin-top: 1rem; }
  .back-link:hover { color: var(--accent); }
  .meta { font-size: 13px; color: var(--ink-faint); margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--rule); }
</style>
</head>
<body>
<main class="contact-page">
  <section class="contact-card">
    <p class="section-eyebrow">Contact</p>
    <h1>Start with one conversation.</h1>
    <p class="lede">No pitch. No proposal until you ask for one. Just 30 minutes to find out if there's something worth fixing.</p>
    <form class="contact-form" action="https://calendly.com/solomon-12/15-minute-session" method="get" target="_blank" rel="noreferrer">
      <input type="email" name="email" placeholder="your@email.com" aria-label="Email address" required />
      <button type="submit">Book a call</button>
    </form>
    <p class="contact-note">Or email directly: <a href="mailto:solomon@devsdecide.com">solomon@devsdecide.com</a></p>
    <a class="back-link" href="/">← Back to homepage</a>
    <div class="meta">Developers Decide LLC &middot; Hoover, Alabama</div>
  </section>
</main>
</body>
