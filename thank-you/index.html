<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f7f5f0" />
<title>Thanks | Developers Decide LLC</title>
<meta name="description" content="Thanks for reaching out. We'll be in touch soon." />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1a18; --ink-muted: #5a5a54; --ink-faint: #9a9a90;
    --paper: #f7f5f0; --rule: #d8d4c8;
    --accent: #2a5c3f; --accent-light: #e8f0eb;
    --sans: 'DM Sans', sans-serif; --serif: 'Playfair Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 17px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  .thank-you-page { min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
  .thank-you-card { max-width: 620px; background: #fff; border: 1px solid var(--rule); border-radius: 12px; padding: 3rem 2rem; text-align: center; box-shadow: 0 22px 50px rgba(26,26,24,0.06); }
  .section-eyebrow { display: inline-block; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .thank-you-card h1 { font-family: var(--serif); font-size: clamp(32px,4vw,48px); line-height: 1.2; margin: 0 0 1rem; }
  .thank-you-card p { color: var(--ink-muted); margin: 0 0 2rem; }
  .thank-you-card a.btn-primary { display: inline-block; background: var(--accent); color: #fff; font-size: 16px; font-weight: 500; padding: 14px 28px; border-radius: 4px; text-decoration: none; transition: background 0.2s; }
  .thank-you-card a.btn-primary:hover { background: #1e4430; }
  .thank-you-card a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<main class="thank-you-page">
  <section class="thank-you-card">
    <p class="section-eyebrow">Thanks</p>
    <h1>We'll be in touch soon.</h1>
    <p>Your message came through. If it's urgent, email <a href="mailto:solomon@devsdecide.com">solomon@devsdecide.com</a>.</p>
    <a class="btn-primary" href="/">Back to homepage</a>
  </section>
</main>
</body>
</html>
